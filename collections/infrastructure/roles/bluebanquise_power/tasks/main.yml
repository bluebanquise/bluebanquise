---
- name: include_vars <|> Gather OS specific variables
  # This task gathers variables defined in OS specific files.
  #
  # Search vars in:
  #  - <distribution>_<major>.yml    # eg. CentOS_8.yml
  #  - <os_family>_<major>.yml       # eg. RedHat_8.yml
  #  - <distribution>.yml            # eg. CentOS.yml
  #  - <os_family>.yml               # eg. RedHat.yml
  #
  # If no OS specific file is found, the role will default to vars/main.yml
  #
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "vars/{{ ansible_facts.distribution | replace(' ','_') }}_{{ ansible_facts.distribution_version }}.yml"
        - "vars/{{ ansible_facts.distribution | replace(' ','_') }}_{{ ansible_facts.distribution_major_version }}.yml"
        - "vars/{{ ansible_facts.os_family }}_{{ ansible_facts.distribution_version }}.yml"
        - "vars/{{ ansible_facts.os_family }}_{{ ansible_facts.distribution_major_version }}.yml"
        - "vars/{{ ansible_facts.distribution | replace(' ','_') }}.yml"
        - "vars/{{ ansible_facts.os_family }}.yml"
      skip: true
  tags:
    - always

- name: "package <|> Install packages"
  ansible.builtin.package:
    name: "{{ bluebanquise_power_packages_to_install }}"
    state: present
  tags:
    - package

- name: "file <|> Create directories structure"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: 0755
  loop:
    - /etc/bluebanquise/
    - /etc/bluebanquise/bluebanquise-power/
    - /usr/share/bluebanquise/
    - /usr/share/bluebanquise/bluebanquise-power/

- name: "template <|> Render configuration"
  ansible.builtin.template:
    src: "bluebanquise-power.yml.j2"
    dest: "/etc/bluebanquise/bluebanquise-power/bluebanquise-power.yml"
    owner: bluebanquise
    group: bluebanquise
    mode: 0640
  tags:
    - template

- name: "copy <|> Copy executable files"
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/usr/bin/{{item}}"
    owner: root
    group: root
    mode: 0755
  loop:
    - bluebanquise-power
    - bluebanquise_power.py

- name: "copy <|> Copy plugin files"
  ansible.builtin.copy:
    src: "plugins/{{ item }}"
    dest: "/usr/share/bluebanquise/bluebanquise-power/{{item}}"
    owner: root
    group: root
    mode: 0755
  loop:
    - IPMI.py
    - REDFISH.py
