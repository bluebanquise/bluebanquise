- name: stat <|> Check for ignition file
  ansible.builtin.stat:
    path: "{{ pxe_stack_htdocs_path }}/pxe/equipment_profiles/{{ item | trim }}.ign"
  register: pxe_stack_file_checks
  loop: "{{ groups | select('match','^tenant_'+'[a-zA-Z0-9]+') | list }}"
  # when:
  #   - pxe_stack_rhcos_enable_tenants
  tags:
    - file

- name: file <|> Create missing ignition files
  ansible.builtin.file:
    path: "{{ item.item }}"
    state: touch
    mode: 0644
  loop: "{{ pxe_stack_file_checks.results }}"
  when: not item.stat.exists
  tags:
    - file

- name: template <|> Generate /etc/bluebanquise/bootset/tenants.yml
  ansible.builtin.template:
    src: "tenants.yml.j2"
    dest: /etc/bluebanquise/bootset/tenants.yml
    mode: 0644
  tags:
    - template

