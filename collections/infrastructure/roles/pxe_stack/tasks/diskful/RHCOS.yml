##### RHCOS os familly

- name: "copy <|> Copy osdeploy files {{ pxe_stack_htdocs_path }}/pxe/osdeploy/"
  ansible.builtin.copy:
    src: osdeploy/rhcos_{{ item.major }}.ipxe
    dest: "{{ pxe_stack_htdocs_path }}/pxe/osdeploy/rhcos_{{ item.major }}.ipxe"
    mode: 0644
    owner: "{{ pxe_stack_apache_user }}"
    group: "{{ pxe_stack_apache_group }}"
  loop: "{{ pxe_stack_supported_os.rhcos }}"

- name: stat <|> Check for ignition file
  ansible.builtin.stat:
    path: "{{ pxe_stack_htdocs_path }}/pxe/equipment_profiles/{{ item | trim }}.ign"
  register: file_checks
  loop: "{{ pxe_stack_equipment_profiles | default({}, true) | flatten(levels=1) }}"
  when:
    - (pxe_stack_equipment_profiles[item]['hw']['hw_equipment_type'] | default(pxe_stack_hw_equipment_type)) == "server"
    - (pxe_stack_equipment_profiles[item]['os']['os_operating_system']['distribution'] | default(pxe_stack_os_operating_system.distribution) | lower) in ['rhcos']
    - (pxe_stack_equipment_profiles[item]['os']['os_operating_system']['distribution_major_version'] | default(pxe_stack_os_operating_system.distribution_major_version) | int) in [4]
  tags:
    - file

- name: file <|> Create missing ignition files
  ansible.builtin.file:
    path: "{{ item.item }}"
  state: touch
  loop: "{{ file_checks.results }}"
  when: not item.stat.exists
  tags:
    - file

- name: "template <|> Generate equipment_profiles {{ pxe_stack_htdocs_path }}/pxe/equipment_profiles/{item}.ipxe"
  ansible.builtin.template:
    src: "RHCOS/equipment_profile_rhcos.ipxe.j2"
    dest: "{{ pxe_stack_htdocs_path }}/pxe/equipment_profiles/{{ item | trim }}.ipxe"
    mode: 0644
    owner: "{{ pxe_stack_apache_user }}"
    group: "{{ pxe_stack_apache_group }}"
  vars:
    equipment: "{{ pxe_stack_equipment_profiles[item] | default({}, true) }}"
  loop: "{{ pxe_stack_equipment_profiles | default({}, true) | flatten(levels=1) }}"
  when:
    - (pxe_stack_equipment_profiles[item]['hw']['hw_equipment_type'] | default(pxe_stack_hw_equipment_type, true)) == "server"
    - (pxe_stack_equipment_profiles[item]['os']['os_operating_system']['distribution'] | default(pxe_stack_os_operating_system.distribution, true) | lower) in ['rhcos']
  tags:
    - template